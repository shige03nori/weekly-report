app = "vicent-weekly-report"
primary_region = "nrt"

[build]

[env]
  DEBUG = "False"
  LANGUAGE_CODE = "ja"
  TIME_ZONE = "Asia/Tokyo"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
