<!DOCTYPE html>
<html lang="ja" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}週報システム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root, [data-bs-theme="dark"] {
      --bs-primary: #FF7800;
      --bs-primary-rgb: 255, 120, 0;
      --bs-body-bg: #111111;
      --bs-body-color: #e0e0e0;
      --bs-link-color: #FF7800;
      --bs-link-hover-color: #ff9a33;
      --bs-border-color: #2a2a2a;
      --bs-card-bg: #1a1a1a;
      --bs-card-border-color: #2a2a2a;
      --bs-table-border-color: #2a2a2a;
      --bs-table-striped-bg: #1f1f1f;
    }

    body {
      background-color: #111111;
    }

    /* Navbar */
    .navbar {
      background-color: #0a0a0a !important;
      border-bottom: 2px solid #FF7800;
    }
    .navbar-brand {
      color: #FF7800 !important;
      font-weight: 700;
      letter-spacing: 0.03em;
    }

    /* Primary button */
    .btn-primary {
      --bs-btn-bg: #FF7800;
      --bs-btn-border-color: #FF7800;
      --bs-btn-hover-bg: #e06a00;
      --bs-btn-hover-border-color: #e06a00;
      --bs-btn-active-bg: #cc5f00;
      --bs-btn-color: #fff;
      --bs-btn-hover-color: #fff;
      --bs-btn-active-color: #fff;
    }
    .btn-outline-primary {
      --bs-btn-color: #FF7800;
      --bs-btn-border-color: #FF7800;
      --bs-btn-hover-bg: #FF7800;
      --bs-btn-hover-color: #fff;
      --bs-btn-active-bg: #e06a00;
    }

    /* Card headers */
    .card-header {
      color: #FF7800;
      font-weight: 600;
      border-bottom-color: #2a2a2a;
    }

    /* Form focus */
    .form-control:focus,
    .form-select:focus {
      border-color: #FF7800;
      box-shadow: 0 0 0 0.25rem rgba(255, 120, 0, 0.2);
    }

    /* Badge primary */
    .badge.bg-primary {
      background-color: #FF7800 !important;
    }

    /* Progress bar primary */
    .progress-bar.bg-primary {
      background-color: #FF7800 !important;
    }

    /* Calendar cards */
    .card.border-success { border-color: #198754 !important; }
    .card.border-warning { border-color: #ffc107 !important; }
    .card.border-danger  { border-color: #dc3545 !important; }
    .card.bg-light { background-color: #1a1a1a !important; }

    /* Login page centering */
    .login-wrapper {
      min-height: calc(100vh - 80px);
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark">
  <div class="container">
    <a class="navbar-brand" href="/">週報システム</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white-50">{{ user.name }}</span>
      {% if user.is_admin %}
        {% url 'admin_status' as admin_url %}
        {% if admin_url %}
          <a class="btn btn-outline-primary btn-sm" href="{{ admin_url }}">管理者画面</a>
        {% endif %}
      {% endif %}
      <a class="btn btn-outline-light btn-sm" href="{% url 'password_change' %}">PW変更</a>
      <form method="post" action="{% url 'logout' %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
      </form>
    </div>
  </div>
</nav>
{% endif %}
<div class="container mt-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
