<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}週報システム{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
{% if user.is_authenticated %}
<nav class="navbar navbar-expand-lg navbar-dark bg-primary">
  <div class="container">
    <a class="navbar-brand" href="/">週報システム</a>
    <div class="ms-auto d-flex align-items-center gap-3">
      <span class="text-white">{{ user.name }}</span>
      {% if user.is_admin %}
        {% url 'admin_status' as admin_url %}
        {% if admin_url %}
          <a class="btn btn-outline-light btn-sm" href="{{ admin_url }}">管理者画面</a>
        {% endif %}
      {% endif %}
      <a class="btn btn-outline-light btn-sm" href="{% url 'password_change' %}">PW変更</a>
      <form method="post" action="{% url 'logout' %}" class="d-inline">
        {% csrf_token %}
        <button type="submit" class="btn btn-outline-light btn-sm">ログアウト</button>
      </form>
    </div>
  </div>
</nav>
{% endif %}
<div class="container mt-4">
  {% for message in messages %}
    <div class="alert alert-{{ message.tags }} alert-dismissible fade show">
      {{ message }}
      <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
    </div>
  {% endfor %}
  {% block content %}{% endblock %}
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
